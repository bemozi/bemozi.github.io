<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Node</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; display: flex; justify-content: center; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; width: 100%; max-width: 350px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin: 10px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #00e676; }
        .user-list { background: #252525; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 0.9rem; }
        .user-item { padding: 5px 0; border-bottom: 1px solid #333; }
        .hidden { display: none; }
        #log { font-size: 9px; color: #666; margin-top: 10px; height: 40px; overflow-y: auto; background: #000; padding: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="status" style="text-align:center; font-size:0.7rem; color:#888;">OFFLINE</div>
    <div id="login-form">
        <input type="text" id="room-id" placeholder="Room ID">
        <input type="password" id="room-pass" placeholder="Password">
        <input type="text" id="user-name" placeholder="Name">
        <button onclick="join()">Join</button>
    </div>
    <div id="room-ui" class="hidden">
        <div class="user-list" id="user-box"></div>
        <button id="mute-btn" style="background:#ff5252; color:#fff;" onclick="toggleMute()">Mute</button>
        <button style="background:#444; color:#fff;" onclick="location.reload()">Exit</button>
    </div>
    <div id="log"></div>
</div>

<script>
    let client, localStream, myId = "p" + Math.floor(Math.random()*9999), peers = {}, channel = "", myName = "";
    const ice = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }] };

    function log(m) { const l = document.getElementById('log'); l.innerText += "\n> " + m; l.scrollTop = l.scrollHeight; }

    async function join() {
        const r = document.getElementById('room-id').value;
        const p = document.getElementById('room-pass').value;
        myName = document.getElementById('user-name').value || myId;
        if(!r || !p) return;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            log("Mic OK");
        } catch(e) { return alert("Mic Error: Use HTTPS"); }

        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('room-ui').classList.remove('hidden');
        
        channel = "rtc/" + btoa(r + p).slice(0,12);
        client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        client.on('connect', () => {
            client.subscribe(channel);
            document.getElementById('status').innerText = "ONLINE: " + r;
            pub({ type: 'hi', from: myId, name: myName });
            addUser(myName, true, myId);
        });

        client.on('message', (t, m) => {
            const d = JSON.parse(m.toString());
            if(d.from === myId) return;
            handle(d);
        });
    }

    async function handle(d) {
        const pid = d.from;
        if(d.type === 'hi') {
            addUser(d.name, false, pid);
            pub({ type: 'back', to: pid, from: myId, name: myName });
            init(pid, true);
        } else if(d.type === 'back' && d.to === myId) {
            addUser(d.name, false, pid);
        } else if(d.type === 'offer' && d.to === myId) {
            const pc = init(pid, false);
            await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
            const a = await pc.createAnswer();
            await pc.setLocalDescription(a);
            pub({ type: 'answer', to: pid, from: myId, sdp: a });
        } else if(d.type === 'answer' && d.to === myId) {
            await peers[pid].setRemoteDescription(new RTCSessionDescription(d.sdp));
        } else if(d.type === 'ice' && d.to === myId && peers[pid]) {
            peers[pid].addIceCandidate(new RTCIceCandidate(d.ice));
        }
    }

    function init(pid, call) {
        if(peers[pid]) return peers[pid];
        const pc = new RTCPeerConnection(ice);
        peers[pid] = pc;
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
        pc.onicecandidate = e => e.candidate && pub({ type: 'ice', to: pid, from: myId, ice: e.candidate });
        pc.ontrack = e => {
            let a = document.getElementById('a-'+pid);
            if(!a) { a = document.createElement('audio'); a.id = 'a-'+pid; a.autoplay = true; document.body.appendChild(a); }
            a.srcObject = e.streams[0];
            log("Audio connected");
        };
        if(call) {
            pc.onnegotiationneeded = async () => {
                const o = await pc.createOffer();
                await pc.setLocalDescription(o);
                pub({ type: 'offer', to: pid, from: myId, sdp: o });
            };
        }
        return pc;
    }

    function pub(d) { client.publish(channel, JSON.stringify(d)); }

    function addUser(n, me, id) {
        if(document.getElementById('u-'+id)) return;
        const b = document.getElementById('user-box');
        const d = document.createElement('div');
        d.id = 'u-'+id; d.className = 'user-item'; d.innerText = n + (me ? " (Me)" : "");
        b.appendChild(d);
    }

    function toggleMute() {
        const t = localStream.getAudioTracks()[0];
        t.enabled = !t.enabled;
        document.getElementById('mute-btn').innerText = t.enabled ? "Mute" : "Unmute";
    }
</script>
</body>
</html>
