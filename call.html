<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-User Audio Room</title>
    <!-- Use a very stable MQTT build -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 6px; border: 1px solid #333; background: #252525; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-join { background: #00e676; color: #121212; }
        .user-list { background: #252525; padding: 10px; border-radius: 6px; margin-top: 15px; min-height: 50px; }
        .user-item { padding: 5px; border-bottom: 1px solid #333; font-size: 0.9rem; }
        .hidden { display: none; }
        #log { font-size: 10px; color: #777; margin-top: 10px; height: 60px; overflow-y: auto; background: #000; padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:#00e676; text-align:center;">Audio Room</h2>
    
    <div id="login-form">
        <input type="text" id="room-id" placeholder="Room ID (e.g. test123)">
        <input type="password" id="room-pass" placeholder="Room Password">
        <input type="text" id="user-name" placeholder="Your Name">
        <button class="btn-join" onclick="joinRoom()">Join Room</button>
    </div>

    <div id="room-ui" class="hidden">
        <div class="user-list">
            <strong>Participants:</strong>
            <div id="users-box"></div>
        </div>
        <button id="mute-btn" style="background:#cf6679; color:white" onclick="toggleMute()">Mute Microphone</button>
        <button style="background:#444; color:white" onclick="location.reload()">Exit</button>
    </div>

    <div id="log">System: Ready. Use HTTPS.</div>
</div>

<div id="audios"></div>

<script>
    let client;
    let localStream;
    let myId = "id_" + Math.random().toString(36).substr(2, 5);
    let peers = {};
    let iceConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };
    let myName = "";

    function log(msg) {
        const l = document.getElementById('log');
        l.innerText += "\n> " + msg;
        l.scrollTop = l.scrollHeight;
    }

    async function joinRoom() {
        const room = document.getElementById('room-id').value;
        const pass = document.getElementById('room-pass').value;
        myName = document.getElementById('user-name').value || myId;

        if (!room || !pass) return alert("Fill all fields");

        try {
            log("Requesting microphone...");
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            log("Mic OK.");
        } catch (e) {
            log("Error: " + e.message);
            return alert("Mic Error. Ensure HTTPS is used.");
        }

        document.getElementById('login-form').classList.add('hidden');
        document.getElementById('room-ui').classList.remove('hidden');

        // Create a unique channel based on Room + Pass
        const channel = "rtcaudio/" + btoa(room + pass).substr(0, 12);
        
        log("Connecting to signal server...");
        // Using a different public broker port/address for better compatibility
        client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        client.on('connect', () => {
            log("Signal Online.");
            client.subscribe(channel);
            // Tell everyone I'm here
            broadcast({ type: 'hello', from: myId, name: myName }, channel);
            addUserToList(myName, true);
        });

        client.on('message', (topic, payload) => {
            const msg = JSON.parse(payload.toString());
            if (msg.from === myId) return;
            handleSignal(msg, channel);
        });
    }

    async function handleSignal(msg, channel) {
        const peerId = msg.from;

        if (msg.type === 'hello') {
            log("New user: " + msg.name);
            addUserToList(msg.name);
            // If someone says hello, initiate connection
            initiatePeer(peerId, channel, true);
        } 
        else if (msg.type === 'offer' && msg.to === myId) {
            log("Received offer from " + peerId);
            const pc = initiatePeer(peerId, channel, false);
            await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            broadcast({ type: 'answer', to: peerId, from: myId, sdp: answer }, channel);
        } 
        else if (msg.type === 'answer' && msg.to === myId) {
            log("Received answer.");
            await peers[peerId].setRemoteDescription(new RTCSessionDescription(msg.sdp));
        } 
        else if (msg.type === 'ice' && msg.to === myId) {
            if (peers[peerId]) {
                await peers[peerId].addIceCandidate(new RTCIceCandidate(msg.candidate));
            }
        }
    }

    function initiatePeer(peerId, channel, isCaller) {
        if (peers[peerId]) return peers[peerId];

        log("Setting up peer: " + peerId);
        const pc = new RTCPeerConnection(iceConfig);
        peers[peerId] = pc;

        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.onicecandidate = (e) => {
            if (e.candidate) {
                broadcast({ type: 'ice', to: peerId, from: myId, candidate: e.candidate }, channel);
            }
        };

        pc.ontrack = (e) => {
            log("Audio stream received!");
            let el = document.getElementById('audio-' + peerId);
            if (!el) {
                el = document.createElement('audio');
                el.id = 'audio-' + peerId;
                el.autoplay = true;
                document.body.appendChild(el);
            }
            el.srcObject = e.streams[0];
        };

        if (isCaller) {
            pc.onnegotiationneeded = async () => {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                broadcast({ type: 'offer', to: peerId, from: myId, sdp: offer }, channel);
            };
        }

        return pc;
    }

    function broadcast(data, channel) {
        client.publish(channel, JSON.stringify(data));
    }

    function addUserToList(name, isMe = false) {
        const box = document.getElementById('users-box');
        const div = document.createElement('div');
        div.className = 'user-item';
        div.innerText = name + (isMe ? " (You)" : "");
        box.appendChild(div);
    }

    function toggleMute() {
        const track = localStream.getAudioTracks()[0];
        track.enabled = !track.enabled;
        document.getElementById('mute-btn').innerText = track.enabled ? "Mute Microphone" : "Unmute Microphone";
        document.getElementById('mute-btn').style.background = track.enabled ? "#cf6679" : "#444";
    }
</script>
</body>
</html>
